<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeSync Tracker</title>
    
    <link rel="stylesheet" href="styles.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="app.js" defer></script>
</head>
<body class="text-slate-800 flex flex-col h-screen overflow-hidden">

    <header class="bg-white/90 backdrop-blur-md px-6 py-4 pt-10 shrink-0 z-20 border-b border-slate-100">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight text-slate-900" id="app-title">Log Your Day</h1>
            
            <div id="mode-switcher" class="hidden bg-slate-100 p-1 rounded-xl flex gap-1">
                <button onclick="setCalendarMode('month')" id="btn-mode-month" class="px-3 py-1.5 rounded-lg text-xs font-bold transition bg-white text-slate-800 shadow-sm">Month</button>
                <button onclick="setCalendarMode('timeline')" id="btn-mode-timeline" class="px-3 py-1.5 rounded-lg text-xs font-bold transition text-slate-500">Timeline</button>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto no-scrollbar relative" id="main-content">
        
        <section id="view-log" class="p-6 space-y-6">
            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Date & Time</label>
                <input type="datetime-local" id="log-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-800 font-semibold focus:outline-none">
            </div>

            <div class="space-y-3 pt-2">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Energy Level</label>
                    <span id="energy-value" class="text-xl font-black text-blue-600">5/10</span>
                </div>
                <input type="range" id="log-energy" min="1" max="10" value="5" class="w-full h-2.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500" oninput="updateEnergyDisplay(this.value)">
                <div class="flex justify-between text-[10px] font-bold text-slate-400 px-1">
                    <span>Exhausted</span>
                    <span>Neutral</span>
                    <span>Hyper</span>
                </div>
            </div>

            <div class="space-y-4 pt-4 border-t border-slate-100">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Emotions</label>
                
                <div class="space-y-2">
                    <span class="text-[10px] font-black uppercase tracking-widest text-emerald-500">Positive</span>
                    <div id="positive-emotions-list" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="space-y-2 pt-2">
                    <span class="text-[10px] font-black uppercase tracking-widest text-rose-500">Negative</span>
                    <div id="negative-emotions-list" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <button onclick="saveCurrentLog()" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition duration-150 mt-4">
                Save Entry
            </button>
        </section>

        <section id="view-calendar" class="hidden h-full">
            
            <div id="calendar-month-container" class="h-full overflow-y-auto no-scrollbar pb-24">
                <div class="sticky top-0 bg-white/95 backdrop-blur-sm z-10 grid grid-cols-7 gap-1 text-center text-[10px] font-extrabold text-slate-400 py-3 border-b border-slate-100">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div id="apple-calendar-stack" class="px-2"></div>
            </div>

            <div id="calendar-timeline-container" class="hidden h-full overflow-y-auto no-scrollbar px-6 py-6 pb-32 relative">
                <div class="absolute left-[39px] top-0 bottom-0 w-[2px] bg-slate-100 z-0"></div>
                
                <div id="continuous-timeline-feed" class="space-y-8 relative z-10"></div>
            </div>

        </section>

        <section id="view-insights" class="hidden p-6 text-center py-20">
            <p class="text-slate-400 font-medium">Analytics and graphs are coming in Step 3!</p>
        </section>

        <section id="view-settings" class="hidden p-6 space-y-6">
            <div class="space-y-4">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Manage Emotions</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-emotion-name" placeholder="Emotion Name" class="flex-grow bg-slate-50 border border-slate-200 rounded-xl p-3 focus:outline-none font-semibold">
                    <select id="new-emotion-valence" class="bg-slate-50 border border-slate-200 rounded-xl p-3 focus:outline-none font-bold text-sm">
                        <option value="positive">Pos (+)</option>
                        <option value="negative">Neg (-)</option>
                    </select>
                    <button onclick="addNewEmotion()" class="bg-blue-600 text-white px-5 rounded-xl font-black shadow-md">+</button>
                </div>
                <div id="settings-emotions-list" class="divide-y divide-slate-100 border-t border-slate-100 mt-4 pt-2"></div>
            </div>
        </section>

    </main>

    <div id="day-modal" class="hidden fixed inset-0 bg-slate-900/30 backdrop-blur-sm flex items-end justify-center z-50 transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg rounded-t-[32px] p-6 pb-12 space-y-6 max-h-[85vh] overflow-y-auto translate-y-full transition-transform duration-300 shadow-2xl" id="day-modal-sheet">
            <div class="flex justify-between items-center sticky top-0 bg-white pb-2 z-10">
                <h3 id="modal-date-title" class="text-2xl font-black text-slate-900">July 14</h3>
                <button onclick="closeDayModal()" class="bg-slate-100 text-slate-500 font-bold p-2 rounded-full w-8 h-8 flex items-center justify-center active:scale-90">✕</button>
            </div>
            <div id="modal-content-area" class="space-y-4"></div>
        </div>
    </div>

    <nav class="bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around py-3 px-2 shrink-0 z-30 absolute bottom-0 w-full pb-[calc(env(safe-area-inset-bottom)+12px)]">
        <button onclick="switchTab('log')" class="tab-btn flex flex-col items-center gap-1 text-blue-600" id="btn-log">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            <span class="text-[10px] font-bold">Log</span>
        </button>
        <button onclick="switchTab('calendar')" class="tab-btn flex flex-col items-center gap-1 text-slate-400" id="btn-calendar">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold">History</span>
        </button>
        <button onclick="switchTab('insights')" class="tab-btn flex flex-col items-center gap-1 text-slate-400" id="btn-insights">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] font-bold">Insights</span>
        </button>
        <button onclick="switchTab('settings')" class="tab-btn flex flex-col items-center gap-1 text-slate-400" id="btn-settings">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-bold">Settings</span>
        </button>
    </nav>
</body>
</html>
