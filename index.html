<script>
        // --- 1. DEFAULT DATASETS (If Local Storage is empty) ---
        const DEFAULT_EMOTIONS = [
            { id: "e_happy", name: "Happy", valence: "positive" },
            { id: "e_calm", name: "Calm", valence: "positive" },
            { id: "e_motivated", name: "Motivated", valence: "positive" },
            { id: "e_stressed", name: "Stressed", valence: "negative" },
            { id: "e_irritated", name: "Irritated", valence: "negative" },
            { id: "e_anxious", name: "Anxious", valence: "negative" }
        ];

        // Global State
        let state = {
            userSettings: {
                customEmotions: []
            },
            dailyLogs: []
        };

        // Track what month the user is looking at on the calendar
        let calendarViewDate = new Date();

        // --- 2. INITIALIZATION ON LOAD ---
        window.addEventListener('load', () => {
            resetLogDatePicker();

            // Load Data from Local Storage
            const savedData = localStorage.getItem('lifesync_data');
            if (savedData) {
                try {
                    state = JSON.parse(savedData);
                    
                    // SELF-HEALING / UPGRADE LOGIC:
                    // If old Step 1 data exists, patch it so the calendar doesn't crash
                    if (!state.dailyLogs) {
                        state.dailyLogs = [];
                    }
                    if (!state.userSettings) {
                        state.userSettings = { customEmotions: DEFAULT_EMOTIONS };
                    }
                    if (!state.userSettings.customEmotions || state.userSettings.customEmotions.length === 0) {
                        state.userSettings.customEmotions = DEFAULT_EMOTIONS;
                    }
                } catch (e) {
                    // Fallback if data is corrupted
                    state = {
                        userSettings: { customEmotions: DEFAULT_EMOTIONS },
                        dailyLogs: []
                    };
                }
            } else {
                state.userSettings.customEmotions = DEFAULT_EMOTIONS;
                saveStateToLocalStorage();
            }

            renderEmotionsInLogger();
            renderEmotionsInSettings();
        });

        function resetLogDatePicker() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('log-date').value = now.toISOString().slice(0, 16);
        }

        function saveStateToLocalStorage() {
            localStorage.setItem('lifesync_data', JSON.stringify(state));
        }

        // --- 3. TAB CONTROLLER ---
        function switchTab(tabId) {
            // Hide all sections
            document.getElementById('view-log').classList.add('hidden');
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-insights').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');

            // Show current section
            document.getElementById(`view-${tabId}`).classList.remove('hidden');

            // Update Tab Button styles
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.replace('text-blue-600', 'text-slate-400'));
            document.getElementById(`btn-${tabId}`).classList.replace('text-slate-400', 'text-blue-600');

            // Update Header Title
            const titles = { log: 'Log Your Day', calendar: 'Calendar View', insights: 'Your Insights', settings: 'Settings' };
            document.getElementById('app-title').innerText = titles[tabId];

            // Render calendar dynamically if calendar view is selected
            if (tabId === 'calendar') {
                renderCalendar();
            }
        }

        // --- 4. DATA LOGGING ENGINE ---
        function updateEnergyDisplay(val) {
            document.getElementById('energy-value').innerText = `${val}/10`;
        }

        function renderEmotionsInLogger() {
            const posList = document.getElementById('positive-emotions-list');
            const negList = document.getElementById('negative-emotions-list');
            posList.innerHTML = '';
            negList.innerHTML = '';

            state.userSettings.customEmotions.forEach(emo => {
                const button = document.createElement('button');
                button.type = 'button';
                button.innerText = emo.name;
                button.dataset.id = emo.id;
                button.className = "px-4 py-2 rounded-xl text-sm border font-medium transition duration-100 bg-slate-50 border-slate-200 text-slate-700 active:scale-95";
                
                button.onclick = () => {
                    button.classList.toggle('bg-slate-50');
                    button.classList.toggle('border-slate-200');
                    button.classList.toggle('text-slate-700');
                    if (emo.valence === 'positive') {
                        button.classList.toggle('bg-emerald-100');
                        button.classList.toggle('border-emerald-400');
                        button.classList.toggle('text-emerald-700');
                    } else {
                        button.classList.toggle('bg-rose-100');
                        button.classList.toggle('border-rose-400');
                        button.classList.toggle('text-rose-700');
                    }
                };

                if (emo.valence === 'positive') {
                    posList.appendChild(button);
                } else {
                    negList.appendChild(button);
                }
            });
        }

        function saveCurrentLog() {
            const dateVal = document.getElementById('log-date').value;
            const energyVal = parseInt(document.getElementById('log-energy').value);

            // Find selected emotions
            const selectedEmotions = [];
            document.querySelectorAll('#positive-emotions-list button, #negative-emotions-list button').forEach(btn => {
                if (btn.classList.contains('bg-emerald-100') || btn.classList.contains('bg-rose-100')) {
                    selectedEmotions.push(btn.dataset.id);
                }
            });

            const newLog = {
                id: 'log_' + Date.now(),
                date: dateVal,
                energy: energyVal,
                emotions: selectedEmotions
            };

            state.dailyLogs.push(newLog);
            saveStateToLocalStorage();

            alert('Entry Saved Successfully!');
            
            // Reset fields
            document.getElementById('log-energy').value = 5;
            updateEnergyDisplay(5);
            resetLogDatePicker();
            renderEmotionsInLogger();
        }

        // --- 5. INTERACTIVE CALENDAR ENGINE ---
        function changeMonth(direction) {
            calendarViewDate.setMonth(calendarViewDate.getMonth() + direction);
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthYearLabel = document.getElementById('calendar-month-year');
            grid.innerHTML = '';

            const year = calendarViewDate.getFullYear();
            const month = calendarViewDate.getMonth();

            // Set Month Name
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            monthYearLabel.innerText = `${monthNames[month]} ${year}`;

            // Get day info
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            // 1. Generate blank padding tiles for days before the 1st
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = "h-14";
                grid.appendChild(emptyCell);
            }

            // 2. Generate actual day tiles
            for (let day = 1; day <= totalDays; day++) {
                const dayTile = document.createElement('div');
                dayTile.className = "h-14 bg-slate-50 border border-slate-200/50 rounded-xl flex flex-col justify-between p-1.5 cursor-pointer active:scale-95 transition-all relative overflow-hidden";

                // Format string for matching database log entries (YYYY-MM-DD)
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // Fetch logs matching this calendar day
                const dayLogs = state.dailyLogs.filter(log => log.date.startsWith(dateString));

                // If logs exist for the day, style the background card
                if (dayLogs.length > 0) {
                    // Get average energy for this day
                    const avgEnergy = dayLogs.reduce((acc, curr) => acc + curr.energy, 0) / dayLogs.length;

                    // Set background shade depending on energy level (Higher Energy = Richer Blues)
                    if (avgEnergy <= 3) {
                        dayTile.className += " bg-blue-50/70 border-blue-200 text-blue-900";
                    } else if (avgEnergy <= 6) {
                        dayTile.className += " bg-blue-100/70 border-blue-300 text-blue-900";
                    } else if (avgEnergy <= 8) {
                        dayTile.className += " bg-blue-200/70 border-blue-400 text-blue-950";
                    } else {
                        dayTile.className += " bg-blue-300 border-blue-500 text-blue-950 font-semibold";
                    }

                    // Render small emotion indicator dots at the bottom
                    const dotsContainer = document.createElement('div');
                    dotsContainer.className = "flex justify-center gap-1 mt-auto";

                    let hasPositive = false;
                    let hasNegative = false;

                    dayLogs.forEach(log => {
                        log.emotions.forEach(emoId => {
                            // Find valence
                            if (emoId === 'fallback_positive') hasPositive = true;
                            else if (emoId === 'fallback_negative') hasNegative = true;
                            else {
                                const found = state.userSettings.customEmotions.find(e => e.id === emoId);
                                if (found) {
                                    if (found.valence === 'positive') hasPositive = true;
                                    if (found.valence === 'negative') hasNegative = true;
                                }
                            }
                        });
                    });

                    if (hasPositive) {
                        const greenDot = document.createElement('span');
                        greenDot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block";
                        dotsContainer.appendChild(greenDot);
                    }
                    if (hasNegative) {
                        const redDot = document.createElement('span');
                        redDot.className = "w-1.5 h-1.5 rounded-full bg-rose-500 inline-block";
                        dotsContainer.appendChild(redDot);
                    }

                    dayTile.appendChild(dotsContainer);
                }

                // Add day number on top
                const dayNum = document.createElement('span');
                dayNum.className = "text-xs font-bold leading-none";
                dayNum.innerText = day;
                dayTile.insertBefore(dayNum, dayTile.firstChild);

                // Open popup modal on tap
                dayTile.onclick = () => openDayModal(dateString, dayLogs);

                grid.appendChild(dayTile);
            }
        }

        // --- 6. DETAILED DAY MODAL CONTROLS ---
        function openDayModal(dateString, logs) {
            const modal = document.getElementById('day-modal');
            const sheet = document.getElementById('day-modal-sheet');
            const title = document.getElementById('modal-date-title');
            const content = document.getElementById('modal-content-area');

            // Format Title
            const [y, m, d] = dateString.split('-');
            const dateObj = new Date(y, parseInt(m) - 1, d);
            title.innerText = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            content.innerHTML = '';

            if (logs.length === 0) {
                // If empty, offer quick retroactive log shortcut
                content.innerHTML = `
                    <div class="text-center py-6 space-y-4">
                        <p class="text-slate-400 text-sm">No entries logged for this day.</p>
                        <button onclick="shortcutRetroactiveLog('${dateString}')" class="bg-blue-600 active:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-xl text-sm transition shadow-sm inline-block">
                            + Log This Day Retroactively
                        </button>
                    </div>
                `;
            } else {
                // Display logs
                logs.forEach((log, index) => {
                    const logCard = document.createElement('div');
                    logCard.className = "bg-slate-50 border border-slate-200 rounded-2xl p-4 space-y-3";

                    // Map log's emotion IDs to names
                    const emotionNames = log.emotions.map(id => {
                        if (id === 'fallback_positive') return `<span class="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded-lg">Deleted Positive</span>`;
                        if (id === 'fallback_negative') return `<span class="bg-rose-100 text-rose-800 text-xs px-2 py-1 rounded-lg">Deleted Negative</span>`;
                        const found = state.userSettings.customEmotions.find(e => e.id === id);
                        if (found) {
                            const badgeClass = found.valence === 'positive' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800';
                            return `<span class="${badgeClass} text-xs px-2 py-1 rounded-lg">${found.name}</span>`;
                        }
                        return '';
                    }).join(' ');

                    const timeString = log.date.split('T')[1] || "All day";

                    logCard.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-semibold text-slate-400">Logged at: ${timeString}</span>
                            <button onclick="deleteLog('${log.id}', '${dateString}')" class="text-rose-500 active:scale-90 text-xs font-bold">Delete</button>
                        </div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100">
                            <span class="text-sm font-semibold text-slate-500">Energy Level</span>
                            <span class="text-base font-extrabold text-blue-600">${log.energy}/10</span>
                        </div>
                        <div class="space-y-1.5">
                            <span class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Emotions</span>
                            <div class="flex flex-wrap gap-1">${emotionNames || '<span class="text-slate-400 text-xs">None</span>'}</div>
                        </div>
                    `;
                    content.appendChild(logCard);
                });
            }

            // Animate Modal opening
            modal.classList.remove('hidden');
            setTimeout(() => {
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        function closeDayModal() {
            const modal = document.getElementById('day-modal');
            const sheet = document.getElementById('day-modal-sheet');

            sheet.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function deleteLog(logId, dateString) {
            if (!confirm("Are you sure you want to delete this specific log?")) return;
            state.dailyLogs = state.dailyLogs.filter(log => log.id !== logId);
            saveStateToLocalStorage();
            
            // Re-render behind the modal first
            renderCalendar();

            // Refresh the current open modal with remaining logs
            const updatedLogs = state.dailyLogs.filter(log => log.date.startsWith(dateString));
            openDayModal(dateString, updatedLogs);
        }

        function shortcutRetroactiveLog(dateString) {
            // Closes modal
            closeDayModal();

            // Sets Log date picker value to that target day at 12:00 PM
            const targetDateTime = `${dateString}T12:00`;
            document.getElementById('log-date').value = targetDateTime;

            // Switches to log tab
            switchTab('log');
        }

        // --- 7. SETTINGS: DYNAMIC CUSTOMIZATION & DELETION FALLBACK ENGINE ---
        function renderEmotionsInSettings() {
            const settingsList = document.getElementById('settings-emotions-list');
            settingsList.innerHTML = '';

            state.userSettings.customEmotions.forEach(emo => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center py-3";
                
                const labelColor = emo.valence === 'positive' ? 'text-emerald-600' : 'text-rose-500';

                row.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="font-semibold text-slate-800">${emo.name}</span>
                        <span class="text-xs ${labelColor} uppercase font-bold px-2 py-0.5 bg-slate-100 rounded-full">${emo.valence}</span>
                    </div>
                    <button onclick="deleteEmotion('${emo.id}')" class="text-rose-600 hover:text-rose-800 text-sm font-medium">Delete</button>
                `;
                settingsList.appendChild(row);
            });
        }

        function addNewEmotion() {
            const nameInput = document.getElementById('new-emotion-name');
            const name = nameInput.value.trim();
            const valence = document.getElementById('new-emotion-valence').value;

            if (!name) return;

            const newEmo = {
                id: 'custom_' + Date.now(),
                name: name,
                valence: valence
            };

            state.userSettings.customEmotions.push(newEmo);
            saveStateToLocalStorage();

            nameInput.value = '';
            renderEmotionsInLogger();
            renderEmotionsInSettings();
        }

        function deleteEmotion(emotionId) {
            if (!confirm("Are you sure you want to delete this emotion? Previous logs using this emotion will safely fallback to a generic placeholder.")) return;

            // CRITICAL GRACE LOGIC:
            // Scan historical logs. Any log containing this exact deleted emotion ID converts to fallbacks.
            const targetEmo = state.userSettings.customEmotions.find(e => e.id === emotionId);
            const fallbackValue = targetEmo.valence === 'positive' ? 'fallback_positive' : 'fallback_negative';

            state.dailyLogs.forEach(log => {
                log.emotions = log.emotions.map(id => id === emotionId ? fallbackValue : id);
            });

            // Remove it from active settings list
            state.userSettings.customEmotions = state.userSettings.customEmotions.filter(e => e.id !== emotionId);

            saveStateToLocalStorage();
            renderEmotionsInLogger();
            renderEmotionsInSettings();
        }
    </script>
