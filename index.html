<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeSync Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevents bouncing/scrolling issues on iOS */
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 flex flex-col h-screen overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 pt-10 shrink-0">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900" id="app-title">Log Your Day</h1>
    </header>

    <main class="flex-grow overflow-y-auto px-4 py-6 space-y-6" id="main-content">
        
        <section id="view-log" class="space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm space-y-2">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Date & Time</label>
                <input type="datetime-local" id="log-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:outline-none focus:border-blue-500">
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Energy Level</label>
                    <span id="energy-value" class="text-lg font-bold text-blue-600">5/10</span>
                </div>
                <input type="range" id="log-energy" min="1" max="10" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500" oninput="updateEnergyDisplay(this.value)">
                <div class="flex justify-between text-xs text-slate-400 px-1">
                    <span>Exhausted</span>
                    <span>Neutral</span>
                    <span>Hyper-Alert</span>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Emotions</label>
                
                <div>
                    <span class="text-sm font-semibold text-emerald-600 mb-2 block">Positive (+)</span>
                    <div id="positive-emotions-list" class="flex flex-wrap gap-2"></div>
                </div>

                <div>
                    <span class="text-sm font-semibold text-rose-500 mb-2 block">Negative (-)</span>
                    <div id="negative-emotions-list" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <button onclick="saveCurrentLog()" class="w-full bg-blue-600 active:bg-blue-700 text-white font-semibold py-4 rounded-2xl shadow-md transition duration-150">
                Save Entry
            </button>
        </section>

        <section id="view-calendar" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center py-10">
                <p class="text-slate-400">Calendar view is coming in Step 2!</p>
            </div>
        </section>

        <section id="view-insights" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center py-10">
                <p class="text-slate-400">Analytics and graphs are coming in Step 3!</p>
            </div>
        </section>

        <section id="view-settings" class="hidden space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400">Manage Emotions</h3>
                
                <div class="flex gap-2">
                    <input type="text" id="new-emotion-name" placeholder="Emotion Name" class="flex-grow bg-slate-50 border border-slate-200 rounded-xl p-3 focus:outline-none">
                    <select id="new-emotion-valence" class="bg-slate-50 border border-slate-200 rounded-xl p-3 focus:outline-none text-sm">
                        <option value="positive">Positive</option>
                        <option value="negative">Negative</option>
                    </select>
                    <button onclick="addNewEmotion()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">+</button>
                </div>

                <div id="settings-emotions-list" class="divide-y divide-slate-100"></div>
            </div>
        </section>

    </main>

    <nav class="bg-white border-t border-slate-200 flex justify-around py-3 px-2 shrink-0">
        <button onclick="switchTab('log')" class="tab-btn flex flex-col items-center gap-1 text-blue-600" id="btn-log">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            <span class="text-[10px] font-medium">Log</span>
        </button>
        <button onclick="switchTab('calendar')" class="tab-btn flex flex-col items-center gap-1 text-slate-400" id="btn-calendar">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-medium">Calendar</span>
        </button>
        <button onclick="switchTab('insights')" class="tab-btn flex flex-col items-center gap-1 text-slate-400" id="btn-insights">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] font-medium">Insights</span>
        </button>
        <button onclick="switchTab('settings')" class="tab-btn flex flex-col items-center gap-1 text-slate-400" id="btn-settings">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-medium">Settings</span>
        </button>
    </nav>

    <script>
        // --- 1. DEFAULT DATASETS (If Local Storage is empty) ---
        const DEFAULT_EMOTIONS = [
            { id: "e_happy", name: "Happy", valence: "positive" },
            { id: "e_calm", name: "Calm", valence: "positive" },
            { id: "e_motivated", name: "Motivated", valence: "positive" },
            { id: "e_stressed", name: "Stressed", valence: "negative" },
            { id: "e_irritated", name: "Irritated", valence: "negative" },
            { id: "e_anxious", name: "Anxious", valence: "negative" }
        ];

        // Global State
        let state = {
            userSettings: {
                customEmotions: []
            },
            dailyLogs: []
        };

        // --- 2. INITIALIZATION ON LOAD ---
        window.addEventListener('load', () => {
            // Set Default Input DateTime to Now
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('log-date').value = now.toISOString().slice(0, 16);

            // Load Data from Local Storage
            const savedData = localStorage.getItem('lifesync_data');
            if (savedData) {
                state = JSON.parse(savedData);
            } else {
                state.userSettings.customEmotions = DEFAULT_EMOTIONS;
                saveStateToLocalStorage();
            }

            renderEmotionsInLogger();
            renderEmotionsInSettings();
        });

        function saveStateToLocalStorage() {
            localStorage.setItem('lifesync_data', JSON.stringify(state));
        }

        // --- 3. TAB CONTROLLER ---
        function switchTab(tabId) {
            // Hide all sections
            document.getElementById('view-log').classList.add('hidden');
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-insights').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');

            // Show current section
            document.getElementById(`view-${tabId}`).classList.remove('hidden');

            // Update Tab Button styles
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.replace('text-blue-600', 'text-slate-400'));
            document.getElementById(`btn-${tabId}`).classList.replace('text-slate-400', 'text-blue-600');

            // Update Header Title
            const titles = { log: 'Log Your Day', calendar: 'Calendar View', insights: 'Your Insights', settings: 'Settings' };
            document.getElementById('app-title').innerText = titles[tabId];
        }

        // --- 4. DATA LOGGING ENGINE ---
        function updateEnergyDisplay(val) {
            document.getElementById('energy-value').innerText = `${val}/10`;
        }

        function renderEmotionsInLogger() {
            const posList = document.getElementById('positive-emotions-list');
            const negList = document.getElementById('negative-emotions-list');
            posList.innerHTML = '';
            negList.innerHTML = '';

            state.userSettings.customEmotions.forEach(emo => {
                const button = document.createElement('button');
                button.type = 'button';
                button.innerText = emo.name;
                button.dataset.id = emo.id;
                button.className = "px-4 py-2 rounded-xl text-sm border font-medium transition duration-100 bg-slate-50 border-slate-200 text-slate-700 active:scale-95";
                
                button.onclick = () => {
                    button.classList.toggle('bg-slate-50');
                    button.classList.toggle('border-slate-200');
                    button.classList.toggle('text-slate-700');
                    if (emo.valence === 'positive') {
                        button.classList.toggle('bg-emerald-100');
                        button.classList.toggle('border-emerald-400');
                        button.classList.toggle('text-emerald-700');
                    } else {
                        button.classList.toggle('bg-rose-100');
                        button.classList.toggle('border-rose-400');
                        button.classList.toggle('text-rose-700');
                    }
                };

                if (emo.valence === 'positive') {
                    posList.appendChild(button);
                } else {
                    negList.appendChild(button);
                }
            });
        }

        function saveCurrentLog() {
            const dateVal = document.getElementById('log-date').value;
            const energyVal = parseInt(document.getElementById('log-energy').value);

            // Find selected emotions
            const selectedEmotions = [];
            document.querySelectorAll('#positive-emotions-list button, #negative-emotions-list button').forEach(btn => {
                if (btn.classList.contains('bg-emerald-100') || btn.classList.contains('bg-rose-100')) {
                    selectedEmotions.push(btn.dataset.id);
                }
            });

            const newLog = {
                id: 'log_' + Date.now(),
                date: dateVal,
                energy: energyVal,
                emotions: selectedEmotions
            };

            state.dailyLogs.push(newLog);
            saveStateToLocalStorage();

            alert('Entry Saved Successfully!');
            
            // Reset fields
            document.getElementById('log-energy').value = 5;
            updateEnergyDisplay(5);
            renderEmotionsInLogger(); // Renders with clean/unselected styles
        }

        // --- 5. SETTINGS: DYNAMIC CUSTOMIZATION & DELETION FALLBACK ENGINE ---
        function renderEmotionsInSettings() {
            const settingsList = document.getElementById('settings-emotions-list');
            settingsList.innerHTML = '';

            state.userSettings.customEmotions.forEach(emo => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center py-3";
                
                const labelColor = emo.valence === 'positive' ? 'text-emerald-600' : 'text-rose-500';

                row.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="font-semibold text-slate-800">${emo.name}</span>
                        <span class="text-xs ${labelColor} uppercase font-bold px-2 py-0.5 bg-slate-100 rounded-full">${emo.valence}</span>
                    </div>
                    <button onclick="deleteEmotion('${emo.id}')" class="text-rose-600 hover:text-rose-800 text-sm font-medium">Delete</button>
                `;
                settingsList.appendChild(row);
            });
        }

        function addNewEmotion() {
            const nameInput = document.getElementById('new-emotion-name');
            const name = nameInput.value.trim();
            const valence = document.getElementById('new-emotion-valence').value;

            if (!name) return;

            const newEmo = {
                id: 'custom_' + Date.now(),
                name: name,
                valence: valence
            };

            state.userSettings.customEmotions.push(newEmo);
            saveStateToLocalStorage();

            nameInput.value = '';
            renderEmotionsInLogger();
            renderEmotionsInSettings();
        }

        function deleteEmotion(emotionId) {
            if (!confirm("Are you sure you want to delete this emotion? Previous logs using this emotion will safely fallback to a generic placeholder.")) return;

            // CRITICAL GRACE LOGIC:
            // Scan historical logs. Any log containing this exact deleted emotion ID must safely 
            // convert to 'fallback_positive' or 'fallback_negative' instead of breaking or disappearing.
            const targetEmo = state.userSettings.customEmotions.find(e => e.id === emotionId);
            const fallbackValue = targetEmo.valence === 'positive' ? 'fallback_positive' : 'fallback_negative';

            state.dailyLogs.forEach(log => {
                log.emotions = log.emotions.map(id => id === emotionId ? fallbackValue : id);
            });

            // Remove it from current active settings
            state.userSettings.customEmotions = state.userSettings.customEmotions.filter(e => e.id !== emotionId);

            saveStateToLocalStorage();
            renderEmotionsInLogger();
            renderEmotionsInSettings();
        }
    </script>
</body>
</html>
